[package]
name = "sana"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "io-util", "sync", "time", "net", "signal"] }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
postcard = { version = "1", default-features = false, features = ["alloc"] }
crc32fast = "1"
bytes = "1"
thiserror = "2"
half = "2"
axum = { version = "0.8.9", default-features = false, features = ["http1", "json", "query", "tokio"] }

[dev-dependencies]
tempfile = "3"
tower = { version = "0.5", features = ["util"] }

[[bench]]
name = "distance"
harness = false
