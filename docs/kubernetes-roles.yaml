apiVersion: v1
kind: Service
metadata:
  name: sana-api
spec:
  selector:
    app: sana
    role: api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sana-queue-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sana
      role: queue-broker
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8090"
        prometheus.io/scrape: "true"
      labels:
        app: sana
        role: queue-broker
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: sana
          image: ghcr.io/example/sana:latest
          args:
            - queue-broker
            - s3://REPLACE_BUCKET/sana
            - 0.0.0.0:8090
            - "http://$(POD_IP):8090"
            - "$(POD_NAME)"
          ports:
            - containerPort: 8090
          livenessProbe:
            httpGet:
              path: /livez
              port: 8090
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8090
          startupProbe:
            httpGet:
              path: /readyz
              port: 8090
            failureThreshold: 30
            periodSeconds: 1
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - secretRef:
                name: sana-s3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sana-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sana
      role: api
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
      labels:
        app: sana
        role: api
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: sana
          image: ghcr.io/example/sana:latest
          args:
            - serve-api
            - s3://REPLACE_BUCKET/sana
            - 0.0.0.0:8080
            - "268435456"
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          startupProbe:
            httpGet:
              path: /readyz
              port: 8080
            failureThreshold: 30
            periodSeconds: 1
          envFrom:
            - secretRef:
                name: sana-s3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sana-indexer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sana
      role: indexer
  template:
    metadata:
      labels:
        app: sana
        role: indexer
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: sana
          image: ghcr.io/example/sana:latest
          args:
            - work-indexing
            - s3://REPLACE_BUCKET/sana
            - "$(POD_NAME)"
            - --loop
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - secretRef:
                name: sana-s3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sana-maintenance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sana
      role: maintenance
  template:
    metadata:
      labels:
        app: sana
        role: maintenance
    spec:
      terminationGracePeriodSeconds: 75
      containers:
        - name: sana
          image: ghcr.io/example/sana:latest
          args:
            - maintain
            - s3://REPLACE_BUCKET/sana
            - "$(POD_NAME)"
            - --loop
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - secretRef:
                name: sana-s3
